<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOC · Single Pane of Glass — Prototype</title>
<style>
  :root{
    --bg:#f3f5f8; --surface:#fff; --ink:#19212e; --ink-2:#5a6477; --ink-3:#9099aa;
    --line:#e3e7ee; --line-2:#eef1f5; --rail:#1c2433; --rail-ink:#c2cad8; --rail-active:#2b3850;
    --blue:#2f6fde; --blue-soft:#ecf2fd;
    --red:#cf3a31; --red-soft:#fcecea; --red-line:#f3cbc6;
    --amber:#b5740a; --amber-soft:#fdf3e2; --amber-line:#f0debb;
    --green:#1d7a4d; --green-soft:#e7f5ed;
    --radius:10px; --radius-s:7px;
    --shadow:0 1px 2px rgba(20,30,50,.05),0 3px 10px rgba(20,30,50,.045);
    --mono:"SF Mono",ui-monospace,Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--sans);background:var(--bg);color:var(--ink);font-size:13.5px;line-height:1.5;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer}
  a{color:var(--blue)}
  .app{display:grid;grid-template-columns:228px 1fr;min-height:100vh}

  /* ---------- rail ---------- */
  .rail{background:var(--rail);color:var(--rail-ink);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
  .brand{padding:17px 18px 15px;border-bottom:1px solid rgba(255,255,255,.08)}
  .brand .logo{display:flex;align-items:center;gap:9px;font-weight:700;color:#fff;font-size:14px}
  .brand .dot{width:18px;height:18px;border-radius:5px;background:linear-gradient(135deg,#4f8cff,#7b61ff)}
  .brand .sub{font-size:10px;letter-spacing:.5px;text-transform:uppercase;margin-top:6px;color:#7e889b}
  .rail-section{padding:15px 14px 5px;font-size:9.5px;letter-spacing:.8px;text-transform:uppercase;color:#6b7589}
  .role-btn{display:flex;flex-direction:column;width:calc(100% - 16px);margin:3px 8px;padding:8px 11px;background:transparent;border:1px solid transparent;border-radius:var(--radius-s);color:var(--rail-ink);text-align:left}
  .role-btn .r-name{font-size:12.5px;font-weight:600;color:#e7ebf3}
  .role-btn .r-meta{font-size:10.5px;color:#828ea3;margin-top:1px}
  .role-btn:hover{background:rgba(255,255,255,.05)}
  .role-btn.active{background:var(--rail-active);border-color:rgba(255,255,255,.10)}
  .role-btn.active .r-name{color:#fff}
  .nav{margin-top:7px;display:flex;flex-direction:column;gap:1px;padding:0 8px}
  .nav a{display:flex;align-items:center;gap:10px;padding:8px 11px;border-radius:var(--radius-s);color:var(--rail-ink);font-size:12.5px;text-decoration:none}
  .nav a:hover{background:rgba(255,255,255,.05)}
  .nav a.on{background:rgba(255,255,255,.08);color:#fff;font-weight:600}
  .nav a .ico{width:16px;text-align:center;opacity:.85}
  .rail-foot{margin-top:auto;padding:13px 15px;border-top:1px solid rgba(255,255,255,.08);font-size:10.5px;color:#727d90;line-height:1.5}

  /* ---------- topbar ---------- */
  .main{display:flex;flex-direction:column;min-width:0}
  .topbar{position:sticky;top:0;z-index:40;background:var(--surface);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px;padding:11px 22px}
  .crumb{font-size:12.5px;color:var(--ink-3)}.crumb b{color:var(--ink);font-weight:600}
  .sys{margin-left:auto;display:flex;align-items:center;gap:13px;font-size:11px;color:var(--ink-2)}
  .sys .s{display:flex;align-items:center;gap:5px}
  .sys .live{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px var(--green-soft)}
  .bell{position:relative;border:1px solid var(--line);background:var(--surface);width:36px;height:36px;border-radius:9px;font-size:16px;display:flex;align-items:center;justify-content:center}
  .bell:hover{background:#f7f8fa}
  .bell .badge{position:absolute;top:-6px;right:-6px;background:var(--red);color:#fff;font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px;border:2px solid #fff}
  .bell .ping{position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:var(--red);opacity:.6;animation:ping 1.4s cubic-bezier(0,0,.2,1) infinite}
  @keyframes ping{75%,100%{transform:scale(2);opacity:0}}

  /* ---------- notif panel ---------- */
  .notif{position:fixed;top:60px;right:20px;width:380px;max-width:calc(100vw - 32px);background:var(--surface);border:1px solid var(--line);border-radius:12px;box-shadow:0 16px 50px rgba(15,23,42,.22);z-index:60;display:none;overflow:hidden}
  .notif.show{display:block}
  .notif-h{padding:13px 16px;border-bottom:1px solid var(--line-2);display:flex;align-items:center;gap:8px;font-weight:700;font-size:13px}
  .notif-h .ct{margin-left:auto;font-size:11px;color:var(--ink-3);font-weight:500}
  .notif-list{max-height:60vh;overflow:auto}
  .nrow{display:flex;gap:11px;padding:12px 16px;border-bottom:1px solid var(--line-2);cursor:pointer}
  .nrow:hover{background:#fafbfc}.nrow:last-child{border-bottom:0}
  .nrow .nbar{width:4px;border-radius:3px;flex-shrink:0}
  .nrow.critical .nbar,.nrow.breached .nbar{background:var(--red)}
  .nrow.warning .nbar{background:var(--amber)}.nrow.watch .nbar{background:var(--ink-3)}
  .nrow .ntitle{font-weight:600;font-size:12.5px}
  .nrow .nmeta{font-size:11px;color:var(--ink-2);margin-top:2px}
  .ntier{font-size:9px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;padding:2px 7px;border-radius:4px;display:inline-block;margin-top:6px}
  .ntier.critical,.ntier.breached{background:var(--red-soft);color:var(--red)}
  .ntier.warning{background:var(--amber-soft);color:var(--amber)}.ntier.watch{background:#eef0f3;color:#5a647a}
  .nrow .nclock{margin-left:auto;font-family:var(--mono);font-weight:700;font-size:12.5px;text-align:right;white-space:nowrap}
  .nclock.red{color:var(--red)}.nclock.amber{color:var(--amber)}

  /* ---------- content ---------- */
  .content{padding:20px 24px 70px;max-width:1280px;width:100%}
  .page-head h1{font-size:20px;margin:0;font-weight:700;letter-spacing:-.3px}
  .page-sub{color:var(--ink-2);font-size:12.5px;margin:4px 0 18px;max-width:760px}
  .section-label{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--ink-3);margin:26px 0 11px;display:flex;align-items:center;gap:9px}
  .section-label .ln{flex:1;height:1px;background:var(--line)}

  /* ---------- proactive breach band (top hierarchy) ---------- */
  .breach{background:linear-gradient(180deg,#fff 0%,var(--red-soft) 100%);border:1px solid var(--red-line);border-left:4px solid var(--red);border-radius:var(--radius);padding:16px 18px;display:grid;grid-template-columns:1fr auto;gap:18px;align-items:center;box-shadow:var(--shadow);margin-bottom:6px}
  .breach .ey{display:flex;align-items:center;gap:8px;font-size:10.5px;font-weight:800;letter-spacing:.7px;text-transform:uppercase;color:var(--red)}
  .breach .pdot{width:9px;height:9px;border-radius:50%;background:var(--red);position:relative}
  .breach .pdot::after{content:"";position:absolute;inset:0;border-radius:50%;background:var(--red);animation:ping 1.5s ease-out infinite}
  .breach h2{font-size:16px;margin:8px 0 4px;font-weight:700}
  .breach .why{font-size:12.5px;color:#7a3b36}
  .breach .meta{display:flex;gap:7px;margin-top:9px;flex-wrap:wrap}
  .breach .clockwrap{text-align:center;padding-left:18px;border-left:1px solid var(--red-line)}
  .breach .clk{font-family:var(--mono);font-size:30px;font-weight:700;color:var(--red);line-height:1;letter-spacing:-1px}
  .breach .clk-l{font-size:10.5px;color:#9a5a55;margin-top:5px;letter-spacing:.3px}
  .breach .acts{grid-column:1 / -1;display:flex;gap:8px;flex-wrap:wrap;padding-top:13px;margin-top:2px;border-top:1px solid var(--red-line)}
  @media(max-width:720px){.breach{grid-template-columns:1fr}.breach .clockwrap{border-left:0;border-top:1px solid var(--red-line);padding:12px 0 0;text-align:left}}
  .slabar{display:flex;align-items:center;gap:11px;background:var(--amber-soft);border:1px solid var(--amber-line);border-radius:var(--radius);padding:11px 15px;margin-top:10px;font-size:12.5px;color:#7a5310}
  .slabar .si{font-size:15px}.slabar b{color:#5e3f0a}.slabar .btn{margin-left:auto;background:#fff}

  /* ---------- toolbar (search + filter) ---------- */
  .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:10px 12px;box-shadow:var(--shadow)}
  .search-lg{flex:1;min-width:230px;display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:9px 13px}
  .search-lg:focus-within{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-soft);background:#fff}
  .search-lg input{border:0;background:transparent;outline:0;font-family:inherit;font-size:13px;color:var(--ink);width:100%}
  .fsel{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-2)}
  .fsel select{border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-family:inherit;font-size:12.5px;background:var(--surface);color:var(--ink);outline:0}
  .fsel select:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-soft)}
  .rescount{font-size:11.5px;color:var(--ink-3);margin-left:auto;white-space:nowrap}

  /* ---------- segmented buckets ---------- */
  .seg{display:inline-flex;background:#e9edf3;border-radius:9px;padding:3px;gap:2px;margin:16px 0 14px;flex-wrap:wrap}
  .seg button{border:0;background:transparent;padding:8px 15px;border-radius:7px;font-weight:600;font-size:12.5px;color:var(--ink-2);display:flex;gap:8px;align-items:center}
  .seg button:hover{color:var(--ink)}
  .seg button.on{background:#fff;color:var(--ink);box-shadow:var(--shadow)}
  .seg .cnt{font-size:11px;font-weight:700;padding:1px 8px;border-radius:11px;background:#d8deea;color:#4b5567}
  .seg button.on.b-jeop .cnt{background:var(--red-soft);color:var(--red)}
  .seg button.on.b-risk .cnt{background:var(--amber-soft);color:var(--amber)}
  .seg button.on.b-un .cnt{background:var(--blue-soft);color:var(--blue)}
  .seg button.on.b-ip .cnt{background:var(--green-soft);color:var(--green)}

  /* ---------- WO cards ---------- */
  .wolist{display:flex;flex-direction:column;gap:10px}
  .wo{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px 16px;border-left:3px solid var(--ink-3)}
  .wo.p1{border-left-color:var(--red)}.wo.p2{border-left-color:var(--amber)}.wo.p3{border-left-color:#aeb6c4}
  .wo-top{display:flex;align-items:flex-start;gap:11px}
  .wo-top .lead{min-width:0;flex:1}
  .wo-id{font-family:var(--mono);font-size:11px;color:var(--ink-3)}
  .wo-desc{font-weight:600;font-size:13.5px;margin-top:1px}
  .wo-right{text-align:right;white-space:nowrap;display:flex;flex-direction:column;align-items:flex-end;gap:3px}
  .wo-clock{font-family:var(--mono);font-weight:700;font-size:16px;letter-spacing:-.3px}
  .wo-clock.red{color:var(--red)}.wo-clock.amber{color:var(--amber)}.wo-clock.green{color:var(--green)}
  .wo-clock-l{font-size:10px;color:var(--ink-3)}
  .wo-due{font-size:12.5px;font-weight:600;color:var(--ink-2)}
  .pill{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;letter-spacing:.3px;flex-shrink:0}
  .pill.p1{background:var(--red-soft);color:var(--red)}.pill.p2{background:var(--amber-soft);color:var(--amber)}.pill.p3{background:#eef0f3;color:#5a647a}
  .chip{font-size:10.5px;padding:2px 8px;border-radius:20px;background:#eef1f5;color:#566074;font-weight:500}
  .chip.absent{background:var(--amber-soft);color:var(--amber)}
  .reason{display:flex;gap:8px;margin-top:11px;padding:9px 11px;background:#fafbfc;border:1px solid var(--line-2);border-left:3px solid var(--amber);border-radius:6px;font-size:12px;color:var(--ink-2)}
  .reason.jeop{border-left-color:var(--red)}
  .reason .rk{font-weight:600;color:var(--ink);white-space:nowrap}
  .happened{margin-top:9px;font-size:12.5px;color:var(--ink-2);line-height:1.55}
  .wo-foot{display:flex;align-items:center;gap:8px;margin-top:12px;flex-wrap:wrap}
  .wo-foot .acts{display:flex;gap:7px;flex-wrap:wrap;margin-left:auto}
  .wo-due-chip{font-size:11px;color:var(--ink-2);font-weight:500}
  .actbar{margin-left:auto;position:relative}
  .menu{position:absolute;right:0;top:calc(100% + 6px);background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 14px 34px rgba(15,23,42,.16);min-width:214px;padding:6px;z-index:50;display:none}
  .menu.show{display:block}
  .menu .mh{font-size:9.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-3);font-weight:700;padding:7px 9px 3px}
  .menu .mi{display:flex;align-items:center;gap:10px;width:100%;text-align:left;border:0;background:transparent;padding:8px 9px;border-radius:7px;font-size:12.5px;color:var(--ink)}
  .menu .mi:hover{background:#f4f6f9}
  .menu .mi.danger{color:var(--red)}
  .menu .mi .mic{width:15px;text-align:center;opacity:.75;font-size:12px}
  .menu .mdiv{height:1px;background:var(--line-2);margin:5px 5px}
  /* cases lens */
  .pipe{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0 0}
  .pipe-i{display:flex;align-items:center;gap:8px;border:1px solid var(--line);background:#fff;border-radius:9px;padding:8px 12px;font-size:12px;color:var(--ink-2);font-weight:600}
  .pipe-i:hover{background:#f7f8fa}
  .pipe-i.on{border-color:var(--blue);background:var(--blue-soft);color:var(--ink)}
  .pipe-i .dotc{width:8px;height:8px;border-radius:50%;display:inline-block}
  .pipe-i .pc{font-size:11px;font-weight:700;background:#eef1f5;color:#48526a;border-radius:10px;padding:1px 8px}
  .pipe-i.on .pc{background:#fff}
  .stp{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;display:inline-block}
  .st-un{background:#eef1f5;color:#5a647a}.st-pa{background:#eae6fb;color:#5a3aa8}.st-wc{background:#e7f0fb;color:#21528f}
  .st-ip{background:#e2f0ea;color:#1d6a45}.st-oh{background:var(--amber-soft);color:var(--amber)}.st-cx{background:var(--red-soft);color:var(--red)}.st-cp{background:#eef1f5;color:#7a8497}
  table.cases{table-layout:fixed;width:100%}
  table.cases th,table.cases td{text-align:left;vertical-align:middle;padding:12px 14px}
  table.cases th:last-child,table.cases td.c-act{text-align:right;white-space:nowrap}
  table.cases td:nth-child(3),table.cases td:nth-child(4){white-space:nowrap}
  .crow{cursor:pointer}
  .crow:hover{background:#fafbfc}
  .crow-desc{font-weight:600;font-size:13px}
  .crow-id{font-family:var(--mono);font-size:10.5px;color:var(--ink-3);margin-top:2px}
  .cases-empty{padding:34px;text-align:center;color:var(--ink-3);display:flex;flex-direction:column;gap:13px;align-items:center}
  .ftokens{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:14px}
  .ftlabel{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-3)}
  .ftoken{display:inline-flex;align-items:center;gap:7px;background:var(--blue-soft);color:#21528f;border:1px solid #cfe0fa;border-radius:20px;padding:4px 6px 4px 11px;font-size:11.5px;font-weight:600}
  .ftx{border:0;background:#fff;color:#21528f;width:17px;height:17px;border-radius:50%;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .ftx:hover{background:#dce9fb}
  .lookup-bar{display:flex;align-items:center;gap:13px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:13px 18px;box-shadow:var(--shadow);width:100%}
  .lookup-bar:focus-within{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-soft)}
  .lookup-bar .mag{font-size:17px;color:var(--ink-3)}
  .lookup-input{flex:1;border:0;outline:0;font-family:inherit;font-size:15px;color:var(--ink);background:transparent}
  .lookup-acts{display:flex;gap:8px;flex-wrap:wrap;margin-top:18px}
  .cancel-btn{color:var(--red);border-color:#f0cdca}.cancel-btn:hover{background:var(--red-soft)}
  .seg.lens{margin:14px 0 2px}

  /* buttons */
  .btn{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;padding:6px 11px;border-radius:7px;border:1px solid var(--line);background:var(--surface);color:var(--ink)}
  .btn:hover{background:#f7f8fa}
  .btn.pri{background:var(--blue);border-color:var(--blue);color:#fff}.btn.pri:hover{background:#2660c8}
  .btn.danger{background:var(--red);border-color:var(--red);color:#fff}.btn.danger:hover{background:#bb332b}
  .btn.sm{padding:5px 10px;font-size:11px}
  .btn.ghost{background:transparent;border-color:transparent;color:var(--blue)}.btn.ghost:hover{background:var(--blue-soft)}
  .btn .ic{font-size:11px;opacity:.9}

  /* queue health */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .card-h{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--line-2)}
  .card-h h2{font-size:13.5px;margin:0;font-weight:700}
  .card-h .ct{font-size:11px;color:var(--ink-3);margin-left:auto}
  .qgrid{display:grid;grid-template-columns:1fr 1fr}
  .qcol{padding:13px 16px}.qcol+.qcol{border-left:1px solid var(--line-2)}
  .qcol h3{font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-3);margin:0 0 9px}
  .qrow{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;font-size:12.5px}
  .qrow .qk{color:var(--ink-2)}
  .qrow .qv{font-weight:700;font-variant-numeric:tabular-nums}
  .qrow .qv .t{font-weight:400;color:var(--ink-3);font-size:11px}
  .qv.bad{color:var(--red)}.qv.warn{color:var(--amber)}.qv.good{color:var(--green)}

  .srcbadge{font-size:9.5px;font-weight:700;letter-spacing:.3px;padding:2px 7px;border-radius:5px;text-transform:uppercase}
  .srcbadge.genesys{background:#e7f0fb;color:#1f5aa8}.srcbadge.sap{background:#e7f5ed;color:#1d6a45}
  .srcbadge.fsm{background:#fcefe0;color:#9a5d05}.srcbadge.spog{background:#eceff3;color:#48526a}
  .tag{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px}
  .tag.native{background:#eceff3;color:#48526a}.tag.sync{background:var(--blue-soft);color:#21528f}.tag.open{background:#f1ecfb;color:#5a3aa8}

  /* legend */
  .legend{display:flex;gap:18px;flex-wrap:wrap;font-size:11px;color:var(--ink-2);margin:14px 2px 0}
  .legend .li{display:flex;align-items:center;gap:6px}

  /* two-col (RM) */
  .grid-2{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;align-items:start}
  @media(max-width:1040px){.grid-2{grid-template-columns:1fr}}
  .rj{display:flex;gap:10px;padding:11px 14px;border-bottom:1px solid var(--line-2);align-items:flex-start}
  .rj:last-child{border-bottom:0}
  .rj .ri{width:24px;height:24px;border-radius:6px;background:var(--red-soft);color:var(--red);display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;font-size:12px}
  .rj .rt{font-size:10.5px;color:var(--ink-3);margin-top:2px}
  .av{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:11px 14px;border-bottom:1px solid var(--line-2)}
  .av:last-child{border-bottom:0}
  .av .an{font-weight:600;font-size:12.5px}.av .am{font-size:11px;color:var(--ink-2);margin-top:2px}
  .sd{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
  .sd.free{background:var(--green)}.sd.busy{background:var(--amber)}.sd.off{background:var(--ink-3)}

  /* ---------- case timeline ---------- */
  .back{display:inline-flex;align-items:center;gap:6px;background:none;border:0;color:var(--blue);font-size:12.5px;font-weight:600;padding:0;margin-bottom:12px}

/* =========================== HELPERS =========================== */
function tier(m){return m<0?"breached":m<=30?"critical":m<=90?"warning":"watch";}
function fmt(m){if(m<0)return "BREACHED";const h=Math.floor(m/60),mm=m%60;return (h>0?h+"h ":"")+mm+"m";}
function clockCls(m){return m<0||m<=30?"red":m<=90?"amber":"green";}

</div>`;

/* breach band — highest hierarchy, the item closest to breach */

  return `<div class="breach">

function pad(m){const mm=String(m).padStart(2,"0");return mm+":00";}

/* proactive alert: WOs approaching their SLA window */
function slaAlertBar(){
  const n=WOS.atrisk.length; if(!n)return "";
  const soon=WOS.atrisk.filter(w=>w.mins<=90).length;
  return `<div class="slabar"><span class="si">⏱</span>

    <button class="btn sm" onclick="setBucket('atrisk')">Review at-risk (${n})</button></div>`;

/* live ticking on the hero clock */
let heroSecs=null,heroTimer=null;
function startHeroClock(){
  const el=document.getElementById("heroClock"); if(!el){clearInterval(heroTimer);return;}
  if(heroSecs===null)heroSecs=28*60-6;
  clearInterval(heroTimer);
  heroTimer=setInterval(()=>{const e=document.getElementById("heroClock");if(!e){clearInterval(heroTimer);return;}
    heroSecs=Math.max(0,heroSecs-1);const m=Math.floor(heroSecs/60),s=heroSecs%60;
    e.textContent=String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");},1000);
}

/* =========================== QUEUE HEALTH (reusable component) =========================== */
function pSec(t){const p=t.split(":").map(Number);return p[0]*60+(p[1]||0);}
function queueHealth(){
  const sel=state.queueContract, q=QUEUEC[sel]||QUEUEC.All;
  const slC=q.calls.sl>=q.calls.slTarget?"good":(q.calls.slTarget-q.calls.sl<=6?"warn":"bad");
  const ahtC=pSec(q.calls.aht)<=pSec(q.calls.ahtTarget)?"good":(pSec(q.calls.aht)-pSec(q.calls.ahtTarget)<=60?"warn":"bad");
  const waitC=q.calls.waiting===0?"good":(q.calls.waiting<=3?"warn":"bad");
  const abN=parseFloat(q.calls.aband), abC=abN<2?"good":(abN<5?"warn":"bad");
  const slaC=q.email.slaMet>=97?"good":(q.email.slaMet>=92?"warn":"bad");
  const unC=q.email.unassigned===0?"good":(q.email.unassigned<=2?"warn":"bad");
  return `<div class="card">
    <div class="card-h"><h2>Live now${sel!=="All"?" · "+sel:""}</h2><span class="srcbadge genesys">Genesys</span>
      <div class="fsel" style="margin-left:auto">Contract
        <select onchange="state.queueContract=this.value;fillQueue()">
          ${["All","Defence","AGFMA","Homes QLD","Infringements"].map(c=>`<option value="${c}" ${sel===c?"selected":""}>${c==="All"?"All contracts":c}</option>`).join("")}
        </select></div>
    </div>
    <div class="qgrid">

const STAGES=["Receive","Triage","Create WO","Dispatch","Track / SLA","Updates","Close","Post-close"];
function tracker(k){
  const idx=(k.trackIdx!=null)?k.trackIdx:2;
  const s3=k.trackStatus||"In progress";
  const hold=/hold/i.test(s3);
  const labels=["Case logged","Work order","Dispatched",s3,"Completed"];
  const last=labels.length-1;
  const fill=(idx/last)*100;
  return `<div class="track">
    <div class="track-line"><div class="track-fill" data-target="${fill}"></div></div>
    <div class="track-steps">
      ${labels.map((l,i)=>{
        const cls = i<idx ? "done" : (i===idx ? (i===last?"done last":("current"+(hold&&i===3?" hold":""))) : "future");
        const ic = (i<idx || (i===idx&&i===last)) ? "✓" : (i===idx ? "●" : (i+1));
        const sub = i<idx ? "" : (i===idx ? (i===last?"closed":"now") : "");
        return `<div class="tstep ${cls}"><div class="tnode2">${ic}</div><div class="tlabel">${l}</div><div class="tsub">${sub}</div></div>`;
      }).join("")}
    </div>
  </div>`;
}

}

  <div class="modal-b"><div class="field"><label>Channel (customer preference)</label><select class="fld"><option>Phone call-back (flagged preference)</option><option>SMS</option><option>Email</option></select></div>
  <div class="field"><label>Message — auto-drafted, edit before sending</label><textarea rows="4">Hi, an update on your no-hot-water request at Bldg 7. The first contractor was unavailable, so we've reassigned it to NorthSide Mechanical, now en route — ETA ~35 min. We'll confirm once they're on site. No action needed from you.</textarea></div></div>
  <div class="modal-f"><span class="nl"><span class="tag sync">◆ sends via SAP / AusPost</span></span><button class="btn" onclick="closeModal()">Cancel</button>
  <button class="btn pri" onclick="closeModal();toast('Proactive update sent to customer','SAP Service Cloud · logged to case')">Send update</button></div>`);
}
function openCancel(id){
  modal(`<div class="modal-h"><h3>Cancel ${id}?</h3><p>Are you sure you want to cancel this work order? The customer will be notified that it won't proceed. This can't be undone.</p></div>
  <div class="modal-f" style="justify-content:flex-end"><button class="btn" onclick="closeModal()">No, keep it</button>
  <button class="btn danger" onclick="cancelConfirmed('${id}')">Yes, cancel</button></div>`);
}
function cancelConfirmed(id){
  document.getElementById("modal").innerHTML=`
    <div class="modal-h"><h3>Work order cancelled</h3></div>
    <div class="modal-b"><div style="display:flex;gap:11px;align-items:flex-start">
      <div style="width:30px;height:30px;border-radius:50%;background:var(--green-soft);color:var(--green);display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0">✓</div>
      <div><div style="font-weight:600">${id} has been cancelled.</div>
      <div style="font-size:12.5px;color:var(--ink-2);margin-top:3px">The customer has been notified that this job won't proceed, and the cancellation has synced to SAP.</div></div>
    </div></div>
    <div class="modal-f"><span class="nl"><span class="tag sync">◆ SAP · customer notified</span></span><button class="btn pri" onclick="closeModal()">Done</button></div>`;
}
function openExport(id){
  modal(`<div class="modal-h"><h3>Export case history — ${id}</h3><p>The timeline is the audit trail: every event with its source system, timestamp and actor. Export it as a compliance-ready record.</p></div>
  <div class="modal-b">
    <div class="field"><label>Format</label><select class="fld"><option>PDF — audit pack (formatted)</option><option>CSV — event log</option><option>JSON — full record</option></select></div>
    <div class="field"><label>Scope</label><select class="fld"><option>Full case history</option><option>Decisions &amp; coordination notes only</option><option>Customer communications only</option></select></div>
    <div style="font-size:11.5px;color:var(--ink-2);background:#fafbfc;border:1px solid var(--line-2);border-radius:7px;padding:9px 11px">Includes the supervisor completion confirmation and every cross-system event, in sequence.</div>
  </div>
  <div class="modal-f"><span class="nl"><span class="tag native">● generated by SPOG</span></span><button class="btn" onclick="closeModal()">Cancel</button>
  <button class="btn pri" onclick="closeModal();toast('Case history exported — PDF audit pack','SPOG · ${id}')">Export</button></div>`);
}
function submitCaseNote(){
  const t=document.getElementById("noteText").value.trim();const vis=document.getElementById("noteVis").value;
  if(!t){toast('Type a note first','');return;}
  const k=CASES[currentCaseId];
  k.notes.unshift({who:"You · "+(role==='rm'?'RM':role==='cx'?'CX':'Team Lead'),vis,t:"now",body:t});
  document.getElementById("caseNotes").innerHTML=k.notes.map(n=>`<div class="note"><div class="nh"><span class="who">${n.who}</span><span class="vis">${n.vis}</span><span class="nt">${n.t}</span></div><div class="nb">${n.body}</div></div>`).join("");
  document.getElementById("noteText").value="";
  toast('Note submitted · visible to '+vis,'SPOG · in the work order');
}

/* =========================== TOASTS =========================== */
function toast(msg,sys){const w=document.getElementById("toasts");const el=document.createElement("div");el.className="toast";
  el.innerHTML=`<span class="td"></span><div>${msg}${sys?`<div class="sn">→ ${sys}</div>`:''}</div>`;w.appendChild(el);
  setTimeout(()=>{el.style.transition="opacity .3s,transform .3s";el.style.opacity="0";el.style.transform="translateX(18px)";setTimeout(()=>el.remove(),300);},3400);}

document.addEventListener("keydown",e=>{if(e.key==="Escape"){closeModal();closeNotif();closeMenus();}});

/* boot */
const _r=render; render=function(){_r();startHeroClock();animateTrack();};
function animateTrack(){const f=document.querySelector(".track-fill");if(f)requestAnimationFrame(()=>{f.style.width=(f.dataset.target||0)+"%";});}
loadFilters();
render();
</script>
</body>
</html>

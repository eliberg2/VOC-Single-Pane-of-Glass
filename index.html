document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

order-radius:20px;box-shadow:0 6px 18px rgba(0,0,0,0.22)\">{{ note }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    persona: \"rm\",\n    view: \"dashboard\",\n    personaMenuOpen: false,\n    assignedTech: null,\n    dispatched: false,\n    toast: false,\n    note: null,\n    commentDraft: \"\",\n    userComments: [],\n    jeopAlertOpen: true,\n    scenario: \"new\",\n    contacted: false,\n    fieldReply: null,\n    agentReassigned: false,\n    agentEmailStage: \"prompt\",\n    agentOpen: true,\n    cxContract: \"agfma\",\n    cxSelected: { m1: true, m2: true, m3: true, m4: true },\n    cxPeriod: \"week\",\n    cxBriefOpen: false,\n  };\n\n  agentToggleOpen = () => this.setState(s => ({ agentOpen: !s.agentOpen }));\n  toggleCxBrief = () => this.setState(s => ({ cxBriefOpen: !s.cxBriefOpen }));\n  setCxPeriod = (p) => this.setState({ cxPeriod: p });\n  setCxContract = (c) => this.setState({ cxContract: c });\n  toggleMember = (id) => this.setState(s => ({ cxSelected: { ...s.cxSelected, [id]: !s.cxSelected[id] } }));\n\n  agentReassign = () => { this.setState({ agentReassigned: true }); this.showNote(\"WO2372 reassigned to Sarah Chen — now Dispatched\"); };\n  agentDraftEmail = () => this.setState({ agentEmailStage: \"draft\" });\n  agentSendEmail = () => { this.setState({ agentEmailStage: \"sent\", agentOpen: false }); this.showNote(\"Customer email sent\"); };\n  agentDismissEmail = () => this.setState({ agentEmailStage: \"dismissed\", agentOpen: false });\n\n  contactFieldWorker = () => {\n    this.setState({ contacted: true });\n    this.showNote(\"Status update request sent to Alain Chevalier\");\n    clearTimeout(this._mt);\n    this._mt = setTimeout(() => this.setState({ view: \"mobile\" }), 1200);\n  };\n  setFieldReply = (r) => { this.setState({ fieldReply: r }); };\n  toWO = () => this.setState({ view: \"detail\" });\n\n  onCommentInput = (e) => this.setState({ commentDraft: e.target.value });\n  onCommentKey = (e) => { if (e.key === \"Enter\") this.postComment(); };\n  postComment = () => {\n    const txt = (this.state.commentDraft || \"\").trim();\n    if (!txt) { this.showNote(\"Type a comment first\"); return; }\n    const entry = { av: \"TH\", who: \"Taylor Hu\", action: \"commented on WO1234\", time: \"Just now\", text: txt, isChat: true, isWrench: false };\n    this.setState(s => ({ userComments: [entry, ...s.userComments], commentDraft: \"\" }));\n    this.showNote(\"Comment added to the timeline\");\n  };\n\n  showNote(msg) {\n    clearTimeout(this._nt);\n    this.setState({ note: msg });\n    this._nt = setTimeout(() => this.setState({ note: null }), 2400);\n  }\n\n  openWO = (scenario, wo) => this.setState({ view: \"detail\", scenario: scenario || \"new\", selWO: wo || null, contacted: false, fieldReply: null, assignedTech: null, dispatched: false });\n  back = () => {\n    if (this.state.view === \"detail\") this.setState({ view: \"dashboard\" });\n    else this.showNote(\"Back\");\n  };\n  togglePersonaMenu = () => this.setState(s => ({ personaMenuOpen: !s.personaMenuOpen }));\n  closePersonaMenu = () => this.setState({ personaMenuOpen: false });\n  selectPersona = (k) => this.setState({ persona: k, personaMenuOpen: false, view: \"dashboard\" });\n  goRM = () => this.setState({ persona: \"rm\", view: \"dashboard\" });\n  goHome = () => this.setState({ persona: \"rm\", view: \"dashboard\", personaMenuOpen: false });\n  assignTech = (k) => { const t = new Date().toLocaleString(\"en-AU\", { day: \"2-digit\", month: \"2-digit\", year: \"numeric\", hour: \"2-digit\", minute: \"2-digit\" }); this.setState({ assignedTech: k, assignedAt: t }); this.showNote(\"Technician assigned — added to timeline\"); };\n  dismissToast = () => this.setState({ toast: false });\n  dispatch = () => {\n    if (!this.state.assignedTech) { this.showNote(\"Select a recommended technician iority 3\", \"Corrective\", \"schedule\", \"AGFMA\", \"01/07/2026\"),\n      woRow(\"WO1234\", \"Repair leak in ceiling\", \"In Progress\", \"5 days remaining\", \"Priority 1\", \"Corrective\", \"grey\", \"AGFMA\", \"06/07/2026\"),\n      woRow(\"WO2388\", \"Service backup generator\", \"In Progress\", \"18 days remaining\", \"Priority 4\", \"Corrective\", \"grey\", \"Homes\", \"19/07/2026\"),\n    ];\n    const tagged = [\n      { id: \"WO2345\", title: \"Repair leak in ceiling\", user: \"Morgan Thompson\", unread: true, text: \"@Taylor Hu can you provide an update on this work order?\", jeop: \"Jeopardy\", jeopColor: RED, pri: \"Priority 1\", priColor: RED, status: \"Corrective\", contract: \"AGFMA\", due: \"01/07/2026\" },\n      { id: \"WO2360\", title: \"Replace faulty HVAC unit\", user: \"Morgan Thompson\", unread: true, text: \"@Taylor Hu can you provide an update on this work order?\", jeop: \"Approaching Jeopardy\", jeopColor: ORANGE, pri: \"Priority 2\", priColor: \"#5b738b\", status: \"Corrective\", contract: \"Homes\", due: \"01/07/2026\" },\n      { id: \"WO2388\", title: \"Service backup generator\", user: \"Morgan Thompson\", unread: false, text: \"@Taylor Hu can you provide an update on this work order?\", jeop: \"In Progress\", jeopColor: GREY, pri: \"Priority 4\", priColor: \"#5b738b\", status: \"Corrective\", contract: \"Homes\", due: \"19/07/2026\" },\n    ];\n\n    const cw = s.selWO || { id: \"WO1234\", title: \"Repair leak in ceiling\", jeop: \"Schedule\", jeopColor: \"#0070F2\" };\n    const cwTitle = cw.title.replace(/\\b\\w/g, c => c.toUpperCase());\n    const cwHeading = cw.id + \": \" + cwTitle;\n    const cwStatus = (cw.jeop && cw.jeop.indexOf(\"Jeopardy\") >= 0) ? cw.jeop : \"Schedule\";\n    const cwStatusColor = (cw.jeop && cw.jeop.indexOf(\"Jeopardy\") >= 0) ? cw.jeopColor : \"#0070F2\";\n\n    const QUEUE = [\n      { title: cwTitle, wo: cw.id, status: cwStatus, statusColor: cwStatusColor },\n      { title: \"Reset Fire Alarm Panel\  [rejectedEntry] : []),\n      { av: \"AC\", who: \"Taylor Hu\", action: \"planned WO1234\", time: \"7/22/2024 at 2:56 PM\", text: \"Selected Electrical Safety Inspection task list\", isWrench: true, isChat: false },\n      { av: \"MT\", who: \"Morgan Thompson\", action: \"created WO1234\", time: \"7/22/2024 at 2:56 PM\", text: \"Work order created from customer call\", isWrench: true, isChat: false },\n      { av: \"JM\", who: \"John Miller\", action: \"contacted VOC\", time: \"7/22/2024 at 2:56 PM\", text: \"Customer called to request work order for a leak in ceiling\", isWrench: false, isChat: true },\n    ];\n    const dispatchedEntry = { av: \"TH\", who: \"Taylor Hu\", action: \"dispatched WO1234\", time: \"7/22/2024 at 2:56 PM\", text: \"Dispatched to \" + assignedName, isWrench: true, isChat: false };\n\n    const isJeop = s.scenario === \"jeop\";\n    const jeopWorker = \"Alain Chevalier\";\n    const acceptedEntry = { av: \"AC\", who: jeopWorker, action: \"accepted WO1234\", time: \"7/22/2024 at 2:56 PM\", text: \"Accepted work order\", isWrench: true, isChat: false };\n    const messagedEntry = { av: \"TH\", who: \"Taylor Hu\", action: \"messaged WO1234\", time: \"7/22/2024 at 2:56 PM\", text: \"Sent message to \" + jeopWorker + \": Hi Alain, please provide an update on your status for WO1234.\", isWrench: false, isChat: true };\n    const replyText = { ontrack: \"Replied: On track — will complete within SLA.\", delayed: \"Replied: Delayed — running behind, still attending.\", eot: \"Requested an extension of time (EOT) for WO1234.\" };\n    const replyEntry = s.fieldReply ? { av: \"AC\", who: jeopWorker, action: \"replied on WO1234\", time: \"Just now\", text: replyText[s.fieldReply], isWrench: false, isChat: true } : null;\n\n    const assignEntry = (s.assignedTech && !s.dispatched) ? { av: \"TH\", who: \"Taylor Hu\", action: \"assigned WO1234\", time: s.assignedAt || \"Just now\", text: \"Assigned to \" + assignedName, isWrench: true, isChat: false } : null;\n\n    let timeline;\n    if (isJeop) {\n      timeline = [\n        ...s.userComments,\n        ...(replyEntry ? [replyEntry] : []),\n        ...(s.contacted ? [messagedEntry] : []),\n        acceptedEntry, dispatchedEntry, ...base,\n      ];\n    } else {\n      timeline = [...s.userComments, ...(s.dispatched ? [dispatchedEntry] : []), ...(assignEntry ? [assignEntry] : []), ...base];\n    }\n\n    const isAssigned = s.dispatched || isJeop;\n    const detailWorker = isJeop ? jeopWorker : assignedName;\n\n    // ── CX Team Lead data ──\n    const DONUT = { all: { o: 10, u: 6, a: 3, j: 1 }, homes: { o: 6, u: 3, a: 2, j: 1 }, agfma: { o: 4, u: 3, a: 1, j: 0 } };\n    const cd = DONUT[s.cxContract] || DONUT.all;\n    const cxTotal = cd.o + cd.u + cd.a + cd.j;\n    let _acc = 0; const _stops = [];\n    [[\"#2e7d32\", cd.o], [\"#7089a0\", cd.u], [\"#df6e0c\", cd.a], [\"#e00d0d\", cd.j]].forEach(function (p) { const st = _acc, en = _acc + (p[1] / cxTotal) * 360; _stops.push(p[0] + \" \" + st + \"deg \" + en + \"deg\"); _acc = en; });\n    const donutBg = \"conic-gradient(\" + _stops.join(\",\") + \")\";\n    const CONTRACTS = [{ key: \"all\", label: \"All\" }, { key: \"homes\", label: \"Homes\" }, { key: \"agfma\", label: \"AGFMA\" }];\n    const MEMBERS = [\n      { id: \"m1\", name: \"Morgan Thompson\", status: \"On Queue\", statusColor: \"#2e7d32\", contract: \"AGFMA, Homes\" },\n      { id: \"m2\", name: \"Dana Ivanov\", status: \"Interacting\", statusColor: \"#0070F2\", contract: \"AGFMA\" },\n      { id: \"m3\", name: \"Priya Sharma\", status: \"Not Responding\", statusColor: \"#cc1d1d\", contract: \"Homes\" },\n      { id: \"m4\", name: \"Tom Baker\", status: \"Communicating\", statusColor: \"#df6e0c\", contract: \"AGFMA, Defence\" },\n      { id: \"m5\", name: \"Wei Chen\", status: \"On Queue\", statusColor: \"#2e7d32\", contract: \"Homes\" },\n    ];\n    const cxSel = s.cxSelected || {};\n    const CXCASES = [\n      { id: \"CE-4471\", title: \"No hot wate
